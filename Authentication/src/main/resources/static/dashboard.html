<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926') no-repeat center/cover;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        .sidebar {
            position: fixed;
            width: 220px;
            height: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 20px;
            color: white;
            z-index: 1;
        }

        .sidebar h4 {
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 10px;
        }

        .main {
            margin-left: 240px;
            padding: 30px;
            position: relative;
            z-index: 1;
            color: white;
        }

        .card-custom {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        table {
            color: white;
        }

        .table thead {
            background: rgba(255,255,255,0.2);
        }
        .card-custom:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4> Dashboard</h4>

    <button class="btn btn-light" onclick="loadUsers()">Users</button>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <h2 class="mb-4">Welcome Back </h2>

    <!-- STATS -->
    <div class="row">
        <div class="col-md-4">
            <div class="card-custom text-center">
                <h5>Total Users</h5>
                <h2 id="userCount">0</h2>
            </div>
        </div>
    </div>

    <!-- USERS TABLE -->
    <div class="card-custom mt-4">
        <h5>User List</h5>

        <table class="table table-bordered mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Roles</th>
            </tr>
            </thead>
            <tbody id="data"></tbody>
        </table>
    </div>

</div>

<script>


    if (!localStorage.getItem("token")) {
        window.location.href = "/auth.html";
    }

    function loadUsers() {
        fetch("/auth/users", {
            headers: {
                "Authorization": "Bearer " + localStorage.getItem("token")
            }
        })
        .then(res => {
            if (res.status === 403) {
                alert("Access Denied (Admin Only)");
                return [];
            }
            return res.json();
        })
        .then(users => {
            let html = "";
            users.forEach(u => {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.roles}</td>
                </tr>`;
            });

            document.getElementById("data").innerHTML = html;
            document.getElementById("userCount").innerText = users.length;
        });
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/auth.html";
    }

</script>

</body>
</html>
