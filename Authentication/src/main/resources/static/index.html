<!DOCTYPE html>
<html>
<head>
    <title>Auth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .card {
            width: 400px;
            padding: 25px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="card bg-dark">

    <h3 class="text-center mb-3">Auth Service</h3>

    <!-- Tabs -->
    <div class="d-flex justify-content-around mb-3">
        <button class="btn btn-outline-light" onclick="showLogin()">Login</button>
        <button class="btn btn-outline-light" onclick="showRegister()">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginDiv">
        <input id="login_username" class="form-control mb-2" placeholder="Username">
        <input id="login_password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <p id="loginMsg" class="mt-2 text-danger"></p>
    </div>

    <!-- REGISTER -->
    <div id="registerDiv" style="display:none;">
        <input id="register_username" class="form-control mb-2" placeholder="Username">
        <input id="register_email" class="form-control mb-2" placeholder="Email">
        <input id="register_password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-success w-100" onclick="register()">Register</button>
        <p id="registerMsg" class="mt-2"></p>
    </div>

</div>

<script>

    function showLogin() {
        document.getElementById("loginDiv").style.display = "block";
        document.getElementById("registerDiv").style.display = "none";
    }

    function showRegister() {
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("registerDiv").style.display = "block";
    }

    function register() {
        fetch("/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("register_username").value,
                email: document.getElementById("register_email").value,
                password: document.getElementById("register_password").value
            })
        })
        .then(res => {
            if (!res.ok) return res.text().then(err => { throw new Error(err); });
            return res.json();
        })
        .then(() => {
            document.getElementById("registerMsg").innerText = "✔ Registered Successfully";
            document.getElementById("registerMsg").className = "text-success";

            setTimeout(showLogin, 1000);
        })
        .catch(err => {
            document.getElementById("registerMsg").innerText = err.message;
            document.getElementById("registerMsg").className = "text-danger";
        });
    }

    function login() {
        fetch("/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("login_username").value,
                password: document.getElementById("login_password").value
            })
        })
        .then(res => {
            if (!res.ok) return res.text().then(err => { throw new Error(err); });
            return res.json();
        })
        .then(data => {
            console.log("TOKEN:", data.token); // debug
            localStorage.setItem("token", data.token);
            window.location.href = "/dashboard.html";
        })
        .catch(err => {
            document.getElementById("loginMsg").innerText = err.message || "Login failed";
        });
    }

</script>

</body>
</html>
