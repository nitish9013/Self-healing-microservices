<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h2>All Users</h2>

<table border="1">
    <tbody id="data"></tbody>
</table>

<script>
    fetch("/auth/users", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(users => {
        let html = "";
        users.forEach(u => {
            html += `<tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email}</td>
                <td>${u.roles}</td>
            </tr>`;
        });
        document.getElementById("data").innerHTML = html;
    })
    .catch(() => alert("Access Denied"));
</script>

</body>
</html>
