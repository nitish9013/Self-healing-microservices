<!DOCTYPE html>
<html>
<head>
    <title>Order Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            height: 100vh;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 class="text-center mb-4">📦 Order Service</h2>

    <!-- CREATE ORDER -->
    <div class="card mb-4">
        <h5>Create Order</h5>

        <input id="product" class="form-control mb-2" placeholder="Product Name">
        <input id="quantity" type="number" class="form-control mb-2" placeholder="Quantity">
        <input id="price" type="number" class="form-control mb-2" placeholder="Price">

        <button class="btn btn-success w-100" onclick="createOrder()">Create Order</button>

        <p id="msg"></p>
    </div>

    <!-- ORDER LIST -->
    <div class="card">
        <h5>Your Orders</h5>

        <button class="btn btn-light mb-2" onclick="loadOrders()">Load Orders</button>

        <table class="table table-bordered text-white">
            <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="orders"></tbody>
        </table>
    </div>

</div>

<script>

    // 🔐 CHECK LOGIN
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "http://localhost:8089/index.html";
    }

    // 🚀 CREATE ORDER
    function createOrder() {

        fetch("http://localhost:8082/api/orders", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                productName: document.getElementById("product").value,
                quantity: document.getElementById("quantity").value,
                price: document.getElementById("price").value
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Order failed");
            return res.json();
        })
        .then(data => {
            document.getElementById("msg").innerText = "✅ Order Created!";
            loadOrders();
        })
        .catch(err => {
            document.getElementById("msg").innerText = err.message;
        });
    }

    // 📦 LOAD ORDERS
    function loadOrders() {

        fetch("http://localhost:8082/api/orders", {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.json())
        .then(data => {

            let html = "";

            data.forEach(o => {
                html += `
                    <tr>
                        <td>${o.id}</td>
                        <td>${o.productName}</td>
                        <td>${o.quantity}</td>
                        <td>${o.price}</td>
                        <td>${o.status}</td>
                    </tr>
                `;
            });

            document.getElementById("orders").innerHTML = html;
        });
    }

</script>

</body>
</html>
